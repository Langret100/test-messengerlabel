<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>실시간 톡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: stretch;
    }
    .messenger-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #f4f6fb;
    }
    .messenger-topbar {
      height: 50px; /* 기존 72px 대비 약 -30% */
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      box-shadow: 0 1px 0 rgba(15,23,42,0.04);
      position: relative;
      z-index: 2;
    }
    .messenger-topbar-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-logo:active { opacity: 0.88; }
    .messenger-topbar-logo img {
      height: 68px; /* 로고만 더 크게 (상단바 높이는 유지) */
      max-height: 100%;
      width: auto;
    }
    .messenger-topbar-close {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      border: none;
      background: transparent;
      font-size: 18px;
      cursor: pointer;
      color: #4b5563;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-close:active {
      background: transparent;
    }
/* ===== 상단바: 현재 대화방 버튼(왼쪽) ===== */
    .messenger-topbar-roombtn{
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      max-width: min(44vw, 260px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;

      display: inline-flex;
      align-items: center;
      gap: 6px;

      border: 1px solid rgba(0,0,0,0.10);
      background: #f3f4f6;
      color: #111827;
      border-radius: 12px; /* 각이 조금 둥근 네모 */
      padding: 7px 10px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: -0.2px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .messenger-topbar-roombtn::after{
      content: "▾";
      font-size: 12px;
      opacity: 0.7;
      flex: 0 0 auto;
    }
    .messenger-topbar-roombtn:active{
      background: #e5e7eb;
    }

    /* ===== 대화방 패널 열림 시 뒤 배경(클릭하면 닫힘) ===== */
    .room-backdrop{
      position: fixed;
      left: 0;
      right: 0;
      top: 50px; /* topbar 높이 */
      bottom: 0;
      background: rgba(15,23,42,0.18);
      display: none;
      z-index: 45;
    }
    .room-backdrop.open{ display:block; }
.messenger-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 10px 8px;
      background: linear-gradient(to bottom, #f4f6fb, #e6ecff);
    }
    .date-separator {
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0;
      font-size: 11px;
      color: #9ca3af;
    }
    .date-separator::before,
    .date-separator::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(148,163,184,0.5);
      margin: 0 6px;
    }
    .date-separator span {
      white-space: nowrap;
    }
    .msg-row {
      width: 100%;
      margin: 4px 0;
      display: flex;
    }
    .msg-row.me {
      justify-content: flex-end;
    }
    .msg-row.other {
      justify-content: flex-start;
    }
    /* msg-inner, msg-avatar, msg-content-wrap 등은 하단 카톡 스타일 CSS 참고 */
    .bubble {
      padding: 8px 12px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      word-break: break-word;
      background: #e5e7eb;
      color: #111827;
    }
    /* 사진 메시지 버블 */
    .bubble.photo-bubble {
      padding: 6px;
      background: #ffffff;
    }
    .msg-row.me .bubble.photo-bubble {
      background: rgba(37, 99, 235, 0.10);
    }
    .chat-photo {
      display: block;
      width: 180px;
      max-width: min(56vw, 240px);
      height: auto;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(15,23,42,0.12);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .bubble.emoji-only {
      background: transparent !important;
      padding: 0 !important;
      border-radius: 0 !important;
    }
    .msg-row.me .bubble.emoji-only,
    .msg-row.other .bubble.emoji-only {
      background: transparent !important;
    }
    .msg-row.me .bubble {
      background: #3b82f6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg-row.other .bubble {
      background: #ffffff;
      color: #111827;
      border-bottom-left-radius: 4px;
    }
    /* msg-meta 는 하단 카톡 스타일 CSS에서 재정의 */
    .empty-hint {
      margin-top: 24px;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
    .messenger-input-bar {
      padding: 8px 10px 12px;
      background: #f9fafb;
      box-shadow: 0 -1px 0 rgba(15,23,42,0.04);
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
      z-index: 2;
    }
    .msg-input-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      background: #e5edff;
      gap: 6px;
    }
    .msg-emoji-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-camera-btn {
      flex: 0 0 auto;
      width: 28px;
      height: 28px;
      border-radius: 999px;
      border: none;
      background: rgba(148,163,184,0.25);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      cursor: pointer;
    }
    .msg-emoji-btn:active {
      background: rgba(148,163,184,0.5);
    }
    .msg-camera-btn:active {
      background: rgba(148,163,184,0.5);
    }

    /* =========================================================
       [+ 첨부 메뉴]
       - + 버튼을 누르면(사진촬영/이미지/파일) 3개 메뉴를 표시
       - social-messenger.js 가 DOM을 생성하고, 여기 CSS가 모양을 담당
       ========================================================= */
    .msg-attach-menu{
      position:absolute;
      left: 46px; /* 😊 버튼 + 여백 기준(대략) */
      bottom: 52px;
      width: 160px;
      background:#ffffff;
      border: 1px solid rgba(148,163,184,0.45);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(15,23,42,0.18);
      padding: 6px;
      display:none;
      z-index: 25;
    }
    .msg-attach-menu.open{ display:block; }
    .msg-attach-item{
      width:100%;
      border:0;
      background:transparent;
      padding: 10px 10px;
      text-align:left;
      font-size: 13px;
      color:#111827;
      border-radius: 12px;
      cursor:pointer;
    }
    .msg-attach-item:active{
      background: rgba(37,99,235,0.10);
    }

    /* 파일 메시지(링크) */
    .file-bubble{
      background:#ffffff;
      color:#111827;
    }
    .msg-row.me .file-bubble{
      background: rgba(37, 99, 235, 0.10);
      color:#111827;
    }
    .file-link{
      color: inherit;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 14px;
      color: #111827;
    }
    .msg-input::placeholder {
      color: #9ca3af;
    }
    .send-btn {
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      padding: 0 20px;
      height: 36px;
      background: #2563eb;
      color: #ffffff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.35);
    }
    .send-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 8px rgba(37, 99, 235, 0.35);
    }
    
.msg-emoji-panel {
  position: absolute;
  left: 10px;
  bottom: 60px;

  /* 실시간 톡 보기 화면(라이트 톤)에 맞춘 이모티콘 패널 */
  width: 340px;
  max-width: min(340px, 92vw);
  background: rgba(244,246,251,0.98);
  border-radius: 16px;
  border: 1px solid rgba(148,163,184,0.45);
  box-shadow: 0 16px 40px rgba(15,23,42,0.22);

  /* 좌/우 동일 여백 확보 */
  padding: 10px;
  display: none;
  z-index: 20;

  /* 화면이 작은 환경에서 잘리지 않도록 */
  max-height: min(320px, calc(100vh - 160px));
  overflow: auto;
}
.msg-emoji-panel.open {
  display: block;
}
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  justify-content: stretch;
}
.emoji-item {
  width: 100%;
  aspect-ratio: 1 / 1;
  height: auto;
  border-radius: 12px;
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}
.emoji-item:active {
  background: rgba(37,99,235,0.14);
}
.chat-emoji {
  width: 100%;
  height: 100%;
  max-width: 72px;
  max-height: 72px;
  object-fit: contain;
  pointer-events: none;
}
    .msg-status {
      position: absolute;
      left: 50%;
      bottom: 56px;
      transform: translateX(-50%);
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(15,23,42,0.86);
      color: #f9fafb;
      font-size: 11px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease-out;
      z-index: 30;
    }
    .msg-status.show {
      opacity: 1;
    }

    /* =========================================================
       [이미지 확대 보기]
       - 채팅 메시지 내 img.chat-photo 또는 [data-zoomable="1"] 클릭 시
         전체 화면으로 확대
       - 다시 누르면(오버레이 클릭) 원래대로
       ========================================================= */
    body.no-scroll {
      overflow: hidden;
    }
    .img-zoom-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.86);
      z-index: 9999;
      -webkit-tap-highlight-color: transparent;
    }
    .img-zoom-overlay.open {
      display: flex;
    }
    .img-zoom-overlay img {
      max-width: 92vw;
      max-height: 92vh;
      width: auto;
      height: auto;
      border-radius: 16px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
    }
  
    /* ===== 대화방 ===== */
    .messenger-main {
      display: flex;
      flex: 1;
      min-height: 0;
      width: 100%;
    }

    /* ── 카톡 스타일: 대화방 목록 항상 왼쪽에 고정 ── */
    .room-panel {
      width: 240px;
      min-width: 200px;
      max-width: 240px;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0;
      /* position:fixed 제거 → flex 흐름에 포함 */
    }
    /* .room-panel.open 은 더 이상 슬라이드 용도로 쓰지 않음 */
    .room-panel.open { transform: none; }
    .room-backdrop { display: none !important; } /* backdrop 완전히 숨김 */
    .room-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 12px 10px;
      border-bottom: 1px solid rgba(0,0,0,0.07);
      background: #f8fafc;
    }
    .room-panel-title {
      font-size: 15px;
      font-weight: 800;
      color: #111827;
      letter-spacing: -0.3px;
    }
    .room-add-btn {
      width: 28px;
      height: 28px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.08);
      background: #f3f4f6;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .room-list {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }
    /* 카톡 스타일 방 아이템 */
    .room-item {
      width: 100%;
      text-align: left;
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      background: transparent;
      border-radius: 0;
      padding: 11px 14px 11px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.1s;
    }
    .room-item:active,
    .room-item:hover { background: rgba(37,99,235,0.06); }
    .room-item.active {
      background: rgba(37,99,235,0.10);
      border-left: 3px solid #2563eb;
      padding-left: 9px;
    }
    /* 방 아이콘 (채팅 버블 아이콘) */
    .room-item-icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #6366f1 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
      color: #fff;
    }
    .room-item.active .room-item-icon {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }
    .room-item-info {
      flex: 1;
      min-width: 0;
    }
    .room-name {
      font-size: 13px;
      font-weight: 700;
      color: #111827;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-meta {
      margin-top: 2px;
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* 미확인 배지 */
    .room-item { position: relative; padding-right: 30px; }
    .room-unread-badge {
      position: absolute;
      top: 50%;
      right: 12px;
      transform: translateY(-50%);
      min-width: 18px;
      height: 18px;
      border-radius: 999px;
      background: #ef4444;
      color: #fff;
      font-size: 10px;
      font-weight: 800;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }
    .room-unread-badge.show { display: flex; }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* 모바일: 패널은 숨기고 topbar 버튼으로 토글 */
    @media (max-width: 600px) {
      .room-panel {
        position: fixed;
        left: 0;
        top: 50px;
        bottom: 0;
        z-index: 50;
        transform: translateX(-110%);
        transition: transform 0.2s ease-out;
        box-shadow: 8px 0 32px rgba(15,23,42,0.18);
        width: 220px;
        min-width: 160px;
      }
      .room-panel.open {
        transform: translateX(0);
      }
      .room-backdrop {
        display: block !important;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.3);
        z-index: 49;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .room-backdrop.open {
        opacity: 1;
        pointer-events: auto;
      }
      /* 모바일에서 topbar 방 버튼 다시 보이게 */
      .messenger-topbar-roombtn { display: flex !important; }
    }

    /* 데스크탑: topbar 방 버튼 숨김 (패널이 항상 보이므로) */
    @media (min-width: 601px) {
      .messenger-topbar-roombtn { display: none !important; }
    }

  
    /* =========================================================
       [채팅 링크/유튜브 미리보기/QR 스캔]
       ========================================================= */
    .msg-link{
      color:#2563eb;
      text-decoration: underline;
      word-break: break-all;
    }
    .msg-link:active{ opacity: 0.8; }

    .yt-preview{
      display:flex;
      gap:10px;
      margin-top:8px;
      padding:8px;
      border:1px solid rgba(148,163,184,0.45);
      border-radius:12px;
      background:#ffffff;
      text-decoration:none;
      color:inherit;
    }
    .msg-row.me .yt-preview{
      background: rgba(37, 99, 235, 0.06);
    }
    .yt-thumb{
      width:96px;
      height:54px;
      object-fit:cover;
      border-radius:10px;
      flex:0 0 auto;
      background:#e5e7eb;
    }
    .yt-info{
      display:flex;
      flex-direction:column;
      justify-content:center;
      min-width:0;
    }
    .yt-title{
      font-size:13px;
      font-weight:700;
      line-height:1.2;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .yt-host{
      font-size:12px;
      color:#6b7280;
      margin-top:4px;
    }

    .qr-scan-overlay{
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 18px;
    }
    .qr-scan-overlay.open{ display:flex; }
    .qr-scan-box{
      width: min(360px, 100%);
      background: #ffffff;
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(15,23,42,0.25);
      overflow: hidden;
    }
    .qr-scan-header{
      padding: 12px 14px;
      font-weight: 800;
      border-bottom: 1px solid rgba(148,163,184,0.35);
    }
    .qr-scan-video{
      width: 100%;
      height: 260px;
      background: #0b1220;
      object-fit: cover;
    }
    .qr-scan-hint{
      padding: 10px 14px;
      font-size: 13px;
      color: #334155;
    }
    .qr-scan-cancel{
      width: calc(100% - 28px);
      margin: 0 14px 14px;
      height: 40px;
      border: none;
      border-radius: 12px;
      background: rgba(37,99,235,0.12);
      color: #1d4ed8;
      font-weight: 800;
      cursor: pointer;
    }

      .zoom-open-link{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);color:#fff;text-decoration:underline;font-size:14px;opacity:.85;display:none;z-index:10000;}
    .img-zoom-overlay.open .zoom-open-link{display:block;}

    /* ===== 카톡 스타일: 프로필 아바타 + 보낸이 이름 ===== */
    .msg-inner {
      max-width: 82%;
      display: inline-flex;
      align-items: flex-start;
      gap: 4px;
    }
    .msg-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      object-fit: cover;
      background: #e0e7ff;
      flex-shrink: 0;
      align-self: flex-start;
    }
    .msg-content-wrap {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .msg-row.me .msg-content-wrap { align-items: flex-end; }
    .msg-row.other .msg-content-wrap { align-items: flex-start; }
    .msg-sender-name {
      font-size: 11px;
      font-weight: 700;
      color: #374151;
      padding-left: 4px;
      margin-bottom: 1px;
    }
    .msg-meta {
      font-size: 10px;
      color: #9ca3af;
      white-space: nowrap;
      align-self: flex-end;
      margin-bottom: 2px;
      padding: 0 2px;
    }
    /* ===== 기어 버튼 ===== */
    #profileGearBtn:hover { color: #2563eb !important; }
    #profileGearBtn:active { opacity: 0.7; }
    /* ===== 배경 이미지 반투명 오버레이 ===== */
    .messenger-body { position: relative; overflow-y: auto; }
    .bg-overlay-layer {
      position: absolute;
      inset: 0;
