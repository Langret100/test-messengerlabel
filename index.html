<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>마이파이</title>
  <link rel="icon" href="images/icons/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/favicon-32x32.png">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="마이파이">
  <meta name="theme-color" content="#4caf50">
  <!-- iOS 홈 화면 아이콘 (사이즈별) -->
  <link rel="apple-touch-icon" sizes="120x120" href="images/icons/icon-120x120.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/icons/icon-152x152.png">
  <link rel="apple-touch-icon" sizes="167x167" href="images/icons/icon-167x167.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/icons/icon-180x180.png">
  <link rel="apple-touch-icon" href="images/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/ghost.css">
  <style>
    html, body { width:100%; height:100%; margin:0; padding:0; background:#0b1220; overflow:hidden; }
    #appRoot { position:fixed; inset:0; }
    #messengerFrame { position:absolute; inset:0; width:100%; height:100%; border:0; background:#f4f6fb; }
    #loginPanel { z-index: 99999 !important; }
    .login-logo-floating { z-index: 100000 !important; }
    #loginPanel .login-backdrop { background: rgba(0,0,0,0.72); }
    #closedOverlay {
      position:absolute; inset:0;
      display:none;
      align-items:center; justify-content:center;
      background:#0b1220;
      color:#fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    }
    #closedOverlay.open { display:flex; }
    .closed-card{
      width:min(420px, 92vw);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 18px 16px;
      text-align:center;
    }
    .closed-card h1{ margin:0 0 10px; font-size:18px; }
    .closed-card p{ margin:0 0 14px; opacity:0.85; font-size:13px; line-height:1.4; }
    .closed-card button{
      border:0; border-radius: 999px;
      padding:10px 14px;
      font-size:14px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <div id="appRoot">
    <iframe id="messengerFrame" title="마이파이 메신저" src="about:blank"></iframe>

    <div id="closedOverlay">
      <div class="closed-card">
        <h1>메신저가 닫혔어요</h1>
        <p>다시 열려면 아래 버튼을 눌러 주세요.</p>
        <button id="reopenBtn" type="button">메신저 다시 열기</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/login.js"></script>
  <script src="js/messenger-only.js"></script>

  <!-- Firebase SDK (top-level 로드: iOS에서 Notification.requestPermission 정상 동작) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script>
    // Firebase 초기화 (index.html top-level — iOS 알림 권한 요청용)
    // games/social-messenger.html 내부의 Firebase와 별개로 동작하지 않도록
    // 앱이 이미 초기화되어 있으면 재사용
    (function() {
      try {
        if (!firebase.apps || firebase.apps.length === 0) {
          firebase.initializeApp({
            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "web-ghost-c447b.firebaseapp.com",
            databaseURL: "https://web-ghost-c447b-default-rtdb.firebaseio.com",
            projectId: "web-ghost-c447b",
            storageBucket: "web-ghost-c447b.firebasestorage.app",
            messagingSenderId: "198377381878",
            appId: "1:198377381878:web:83b56b1b4d63138d27b1d7"
          });
        }
      } catch(e) {
        console.warn('[index] Firebase 초기화 오류:', e.message || e);
      }
    })();
  </script>

  <!-- FCM 푸시 토큰 관리 + PWA 배지 (top-level 로드 필수: iOS iframe 제한 우회) -->
  <script src="js/fcm-push.js"></script>
  <script src="js/pwa-manager.js"></script>

  <!-- SW 등록은 pwa-manager.js의 registerSW()가 담당 -->
</body>
</html>
